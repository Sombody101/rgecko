name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      
      - uses: Sombody101/global-build/.github/actions/global-build@main
        with:
          bin_name: 'rgecko'
          
      - uses: softprops/action-gh-release@v2
        with:
          files: rgecko-*
